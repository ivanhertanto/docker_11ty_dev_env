services:
  nodejs-dev:
    build: .
    container_name: nodejs-dev
    image: nodejs-dev:latest
    volumes:
      # Mount your local directory to /app in container
      # Change ./src to your actual source directory
      - ./src:/app
    working_dir: /app
    stdin_open: true
    tty: true
    ports:
      - "3000:3000"    # Adjust port as needed
      - "5173:5173"    # For Vite or similar dev servers
    environment:
      - NODE_ENV=development
      - NPM_CONFIG_LOGLEVEL=debug
    command: /bin/bash